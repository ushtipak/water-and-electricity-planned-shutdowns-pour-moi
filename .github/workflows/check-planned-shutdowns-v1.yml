name: check-planned-shutdown
on:
  schedule:
    - cron:  '15 7,9,18 * * *'
  workflow_dispatch:

jobs:
  check-planned-shutdown:
    runs-on: ubuntu-latest
    steps:
      - name: Check water supply today
        run: if [ "$(curl -sk 'https://www.bvk.rs/planirani-radovi' | grep "Чукарица" | grep $(date "+%d\."))" != "" ] && [ "$(curl -sk 'https://www.bvk.rs/planirani-radovi' | grep "Радничка")" != "" ]; then echo "*More likely* No WATER **TODAY** [!]"; exit 1; fi

      - name: Check electricity today
        run: if [[ "$(curl -sk 'https://elektrodistribucija.rs/planirana-iskljucenja-beograd/Dan_0_Iskljucenja.htm' | grep "РАДНИЧКА" | grep -i "Чукарица")" != "" ]]; then echo "No ELECTRICITY **TODAY** [!]"; exit 1; fi

      - name: Check electricity tomorrow
        run: if [[ "$(curl -sk 'https://elektrodistribucija.rs/planirana-iskljucenja-beograd/Dan_1_Iskljucenja.htm' | grep "РАДНИЧКА" | grep -i "Чукарица")" != "" ]]; then echo "No ELECTRICITY **TOMORROW** [!]"; exit 1; fi

